name: Continuous Integration

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  quality:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Build application
        run: docker compose up --build -d

      - name: Inspect Docker network
        run: |
          docker network ls
          docker network inspect $(docker compose ps -q app | xargs docker inspect -f '{{range $k,$v := .NetworkSettings.Networks}}{{println $k}}{{end}}')

      - name: Wait for MariaDB health
        run: |
          until [ "$(docker inspect -f '{{.State.Health.Status}}' mental-health-db)" = "healthy" ]
          do
            echo "Waiting for MariaDB health..."
            sleep 2
          done

      - name: Show containers
        run: docker compose ps

      - name: Show database logs
        run: docker compose logs db

      - name: Docker versions
        run: |
          docker --version
          docker compose version

      - name: Inspect containers
        run: docker compose ps

      - name: Show networks
        run: docker network ls

      - name: Inspect compose network
        run: docker network inspect $(docker compose ps -q app | xargs docker inspect -f '{{range $k,$v := .NetworkSettings.Networks}}{{println $k}}{{end}}')

      - name: Resolve db
        run: docker compose exec -T app getent hosts db

      - name: Ping db
        run: docker compose exec -T app ping -c 4 db


      - name: Test database connection from app
        run: |
          docker compose exec -T app which mariadb-admin
          docker compose exec -T app mariadb-admin \
          --host=db \
          --user=mental_health \
          --password=secret \
          ping
      - name: Show container status
        run: docker compose ps

      - name: Show app logs
        run: docker compose logs app

      - name: List project files
        run: docker compose exec -T app ls -la /var/www/html

      - name: Check container
        run: |
          docker compose ps
          docker compose exec -T app pwd
          docker compose exec -T app ls -la /var/www/html

      - name: Show app logs
        if: always()
        run: docker compose logs app

      - name: Composer manually
        run: docker compose exec -T app composer install -vvv

      - name: Verify containers
        run: docker compose ps

      - name: Run Laravel Pint
        run: docker compose exec -T app ./vendor/bin/pint --test

      - name: Show memory
        run: |
          free -h
          php -v

      - name: Verify app container
        run: |
          docker compose ps

      - name: Run PHPStan
        run: docker compose exec -T app ./vendor/bin/phpstan analyse --no-progress

      - name: Run PHPUnit with Coverage
        run: docker compose exec -T app php artisan test --coverage

      - name: Shutdown containers
        if: always()
        run: docker compose down --volumes --remove-orphans
